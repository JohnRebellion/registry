name: Tests

# Runs the stdlib unittest suite for the quality-check scripts. The registry
# ships no pip dependencies, so this needs nothing but a Python interpreter.
# Scoped to script/test changes so pack-only PRs (index.json edits) stay fast.

on:
  pull_request:
    paths:
      - '.github/scripts/**'
      - 'tests/**'
      - '.github/workflows/tests.yml'
  push:
    branches: [main]
    paths:
      - '.github/scripts/**'
      - 'tests/**'
      - '.github/workflows/tests.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run unittest suite
        run: python3 -m unittest discover tests -v
